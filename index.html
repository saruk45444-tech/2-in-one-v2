<script>
    // ======================= MODULE 1 – COMPLETE (fully functional) =======================
    (function() {
        const BINANCE = "https://fapi.binance.com";
        const COINS = ["BTC","ETH","SOL","BNB","XRP","DOGE","ADA","AVAX","DOT","LINK","MATIC","UNI","ATOM","LTC","ETC","FIL","APT","ARB","OP","INJ","FET","ENA","LDO","HBAR","XLM","NEAR","RENDER","JUP","WLD","ONDO","SUI","SEI","AAVE","CRV","GALA","SAND","AXS","ALGO","VET","QNT","MKR","COMP","ZEC","ZRO","PENDLE","STX","TRUMP","ENS","TIA","API3"];
        const ALL_SYMBOLS1 = COINS.map(c=>c+"USDT");
        let btcTrend = "NEUTRAL", activeTrades = new Map(), signalLog = [], balance = 10000, realizedPnL = 0, totalTradesClosed = 0, totalWins = 0, voiceMuted = false, lastPrices = new Map(), tvWidget = null;
        window.app1ToggleCardVisibility = function(id) { let el = document.getElementById(id); if(el) el.classList.toggle('hidden-card'); };
        window.app1ShowAllSections = function() { document.querySelectorAll('#app1Root .card').forEach(c=>c.classList.remove('hidden-card')); };
        function addAlertMsg(text,type="info"){ let box=document.getElementById('alertMessagesBox1'); if(!box) return; if(box.innerHTML.includes("⏳ Waiting")) box.innerHTML=""; let d=document.createElement('div'); d.className=`alert-item ${type==='warning'?'warning':'info'}`; d.innerHTML=`<span>🔊 ${text}</span><span>${new Date().toLocaleTimeString()}</span>`; box.prepend(d); setTimeout(()=>{if(d.parentNode)d.remove(); if(box.children.length===0) box.innerHTML='<div style="color:#94a3b8;text-align:center;">⏳ Waiting for price moves...</div>';},300000);}
        function triggerVoice(msg,type){ addAlertMsg(msg,type); if(!voiceMuted){ let u=new SpeechSynthesisUtterance(msg); u.rate=0.95; window.speechSynthesis.cancel(); window.speechSynthesis.speak(u);}}
        function saveState(){ localStorage.setItem('balance1',balance); localStorage.setItem('realizedPnL1',realizedPnL); localStorage.setItem('totalTrades1',totalTradesClosed); localStorage.setItem('totalWins1',totalWins); localStorage.setItem('activeTrades1',JSON.stringify(Array.from(activeTrades.entries()))); localStorage.setItem('signalLog1',JSON.stringify(signalLog.slice(0,20)));}
        function loadState(){ try{ balance=parseFloat(localStorage.getItem('balance1'))||10000; realizedPnL=parseFloat(localStorage.getItem('realizedPnL1'))||0; totalTradesClosed=parseInt(localStorage.getItem('totalTrades1'))||0; totalWins=parseInt(localStorage.getItem('totalWins1'))||0; let a=localStorage.getItem('activeTrades1'); if(a) activeTrades=new Map(JSON.parse(a)); let l=localStorage.getItem('signalLog1'); if(l) signalLog=JSON.parse(l); }catch(e){}}
        function calcRSI(prices,period=14){ if(prices.length<period+2) return 50; let gains=0,losses=0; for(let i=1;i<=period;i++){ let d=prices[i]-prices[i-1]; if(d>=0) gains+=d; else losses-=d;} let avgGain=gains/period, avgLoss=losses/period; for(let i=period+1;i<prices.length;i++){ let d=prices[i]-prices[i-1]; if(d>=0) avgGain=(avgGain*(period-1)+d)/period; else avgLoss=(avgLoss*(period-1)-d)/period;} if(avgLoss===0) return avgGain===0?50:100; return 100-(100/(1+avgGain/avgLoss));}
        function calcEMA(prices,period){ if(prices.length<period) return null; let k=2/(period+1), ema=prices.slice(0,period).reduce((a,b)=>a+b,0)/period; for(let i=period;i<prices.length;i++) ema=prices[i]*k+ema*(1-k); return ema;}
        async function getBtcTrend(){ try{ let r=await fetch(`${BINANCE}/fapi/v1/klines?symbol=BTCUSDT&interval=1h&limit=50`); let c=await r.json(), closes=c.map(x=>parseFloat(x[4])), rsi=calcRSI(closes,14), ema9=calcEMA(closes,9), ema21=calcEMA(closes,21); btcTrend=(rsi>52 && ema9>ema21)||(ema9>ema21 && rsi>48)?"BULLISH":"BEARISH"; let b=document.getElementById('btcTrendBadge1'); if(b){ b.innerText=btcTrend==="BULLISH"?"📈 BULLISH (LONG ONLY)":"📉 BEARISH (SHORT ONLY)"; b.className=btcTrend==="BULLISH"?"trend-badge trend-bullish":"trend-badge trend-bearish";} }catch(e){}}
        async function scanCoin(symbol){ try{ let [klineRes,fundRes]=await Promise.all([fetch(`${BINANCE}/fapi/v1/klines?symbol=${symbol}&interval=1h&limit=50`), fetch(`${BINANCE}/fapi/v1/fundingRate?symbol=${symbol}&limit=1`)]); let candles=await klineRes.json(); if(!candles||candles.length<30) return null; let closes=candles.map(c=>parseFloat(c[4])), cp=closes[closes.length-1], rsi14=calcRSI(closes,14), rsi7=calcRSI(closes,7), ema9=calcEMA(closes,9), ema21=calcEMA(closes,21); let buyVol=0,sellVol=0; candles.slice(-24).forEach(c=>{ let vol=parseFloat(c[7]); if(parseFloat(c[4])>parseFloat(c[1])) buyVol+=vol; else sellVol+=vol;}); let totalVol=buyVol+sellVol, cvdPct=totalVol>0?((buyVol-sellVol)/totalVol)*100:0; let depthRes=await fetch(`${BINANCE}/fapi/v1/depth?symbol=${symbol}&limit=20`), depth=await depthRes.json(); let bidQty=depth.bids?depth.bids.reduce((s,b)=>s+parseFloat(b[1]),0):0, askQty=depth.asks?depth.asks.reduce((s,a)=>s+parseFloat(a[1]),0):0, obPct=(bidQty+askQty)>0?(bidQty/(bidQty+askQty))*100:50; let fundRate=0, fundData=await fundRes.json(); if(fundData&&fundData.length) fundRate=parseFloat(fundData[0].fundingRate)*100; let tr=[]; for(let i=1;i<candles.length;i++) tr.push(Math.max(parseFloat(candles[i][2])-parseFloat(candles[i][3]),Math.abs(parseFloat(candles[i][2])-parseFloat(candles[i-1][4])),Math.abs(parseFloat(candles[i][3])-parseFloat(candles[i-1][4])))); let atr=tr.slice(-14).reduce((a,b)=>a+b,0)/14; let side=null; if(btcTrend==="BULLISH" && rsi14<45) side="LONG"; else if(btcTrend==="BEARISH" && rsi14>55) side="SHORT"; if(!side) return null; let slDist=atr*1.4, tpDist=slDist*2.0, sl=side==="LONG"?cp-slDist:cp+slDist, tp=side==="LONG"?cp+tpDist:cp-tpDist, score=0; if(side==="LONG"){ if(rsi14<35) score+=3; else if(rsi14<42) score+=2; if(ema9&&ema21&&ema9>ema21) score+=2; if(cvdPct>5) score+=2; if(obPct>55) score+=2; if(fundRate<0.01) score+=1;} else{ if(rsi14>65) score+=3; else if(rsi14>58) score+=2; if(ema9&&ema21&&ema9<ema21) score+=2; if(cvdPct<-5) score+=2; if(obPct<45) score+=2; if(fundRate>-0.01) score+=1;} score=Math.min(10,Math.max(0,score)); let confidence=Math.min(96,55+Math.floor(score*4.1)); return {symbol,side,entryPrice:cp,sl,tp,rsi14:rsi14.toFixed(1),rsi7:rsi7.toFixed(1),emaTrend:(ema9&&ema21)?(ema9>ema21?"↑ Bull":"↓ Bear"):"Flat",cvd:(cvdPct>=0?"+":"")+cvdPct.toFixed(1)+"%",ob:obPct.toFixed(1)+"%",fund:(fundRate>=0?"+":"")+fundRate.toFixed(4)+"%",score,confidence,leverage:3,tradeSize:500,margin:166.67,currentPrice:cp,pnlPct:0,floatingPnL:0}; }catch(e){return null;}}
        async function runBotScan(){ if(activeTrades.size>=6) return; await getBtcTrend(); let target=document.getElementById('coinSelect1').value; let symbols=target==="ALL"?ALL_SYMBOLS1:[target]; for(let sym of symbols){ if(activeTrades.has(sym)||activeTrades.size>=6) continue; let signal=await scanCoin(sym); if(signal){ activeTrades.set(sym,signal); signalLog.unshift({time:new Date().toLocaleTimeString(),symbol:signal.symbol,side:signal.side,rsi14:signal.rsi14,rsi7:signal.rsi7,ema:signal.emaTrend,cvd:signal.cvd,ob:signal.ob,funding:signal.fund,score:signal.score,confidence:signal.confidence,entry:signal.entryPrice,sl:signal.sl,tp:signal.tp,result:"OPEN"}); if(signalLog.length>20) signalLog=signalLog.slice(0,20); saveState(); triggerVoice(`${signal.side} signal on ${signal.symbol.replace("USDT","")}`,"info"); break;} } updateUI();}
        function updateUI(){ let floating=0; for(let t of activeTrades.values()) floating+=t.floatingPnL; document.getElementById('balanceVal1') && (document.getElementById('balanceVal1').innerHTML=`$${(balance+floating).toFixed(2)}`); let fEl=document.getElementById('floatPnL1'); if(fEl){ fEl.innerHTML=`${floating>=0?'+':''}$${floating.toFixed(2)}`; fEl.style.color=floating>=0?'#10b981':'#ef4444';} document.getElementById('realPnL1') && (document.getElementById('realPnL1').innerHTML=`${realizedPnL>=0?'+':''}$${realizedPnL.toFixed(2)}`); let wr=totalTradesClosed>0?((totalWins/totalTradesClosed)*100).toFixed(1):0; document.getElementById('winRate1') && (document.getElementById('winRate1').innerHTML=`${wr}%`); document.getElementById('totalTrades1') && (document.getElementById('totalTrades1').innerHTML=totalTradesClosed); document.getElementById('activeCount1') && (document.getElementById('activeCount1').innerHTML=`${activeTrades.size}/6`); let tbody=document.getElementById('activeTbody1'); if(tbody){ if(activeTrades.size===0) tbody.innerHTML='<tr><td colspan="12">No active positions</td></tr>'; else{ let idx=1; tbody.innerHTML=Array.from(activeTrades.values()).map(t=>`<tr><td>${idx++}</td><td class="coin-clickable" onclick="window.app1LoadChart('${t.symbol}')">${t.symbol}</td><td style="color:${t.side==='LONG'?'#10b981':'#ef4444'}">${t.side}</td><td>$${t.entryPrice.toFixed(2)}</td><td>$${t.currentPrice.toFixed(2)}</td><td>$${t.tradeSize}</td><td>$${t.margin.toFixed(2)}</td><td>${t.leverage}x</td><td style="color:#ef4444">$${t.sl.toFixed(2)}</td><td style="color:#10b981">$${t.tp.toFixed(2)}</td><td class="${t.pnlPct>=0?'positive':'negative'}">${t.pnlPct>=0?'+':''}${t.pnlPct.toFixed(2)}%</td><td><button class="btn" onclick="window.app1CloseTrade('${t.symbol}')">CLOSE</button></td></tr>`).join('');} } let logBody=document.getElementById('signalLogTbody1'); if(logBody){ if(signalLog.length===0) logBody.innerHTML='<tr><td colspan="15">No signals yet</td></tr>'; else logBody.innerHTML=signalLog.map(s=>`<tr><td>${s.time}</td><td class="coin-clickable" onclick="window.app1LoadChart('${s.symbol}')"><b>${s.symbol}</b></td><td style="color:${s.side==='LONG'?'#10b981':'#ef4444'}">${s.side}</td><td class="positive">${s.rsi14}</td><td>${s.rsi7}</td><td>${s.ema}</td><td class="${s.cvd.startsWith('-')?'negative':'positive'}">${s.cvd}</td><td>${s.ob}</td><td>${s.funding}</td><td>${s.score}/10</td><td>${s.confidence}%</td><td>$${s.entry.toFixed(2)}</td><td>$${s.sl.toFixed(2)}</td><td>$${s.tp.toFixed(2)}</td><td><span class="trend-badge ${s.result==='OPEN'?'trend-neutral':s.result==='WIN'?'trend-bullish':'trend-bearish'}">${s.result}</span></td></tr>`).join('');} }
        async function monitorPrices(){ try{ let res=await fetch(`${BINANCE}/fapi/v1/ticker/price`); let prices=await res.json(); let now=Date.now(); for(let p of prices){ let sym=p.symbol; if(!ALL_SYMBOLS1.includes(sym)) continue; let cp=parseFloat(p.price); if(activeTrades.has(sym)){ let t=activeTrades.get(sym); t.currentPrice=cp; let raw=t.side==="LONG"?((cp-t.entryPrice)/t.entryPrice)*100:((t.entryPrice-cp)/t.entryPrice)*100; t.pnlPct=raw*t.leverage; t.floatingPnL=(t.tradeSize*t.pnlPct)/100; let slHit=t.side==="LONG"?cp<=t.sl:cp>=t.sl, tpHit=t.side==="LONG"?cp>=t.tp:cp<=t.tp; if(slHit||tpHit){ let win=tpHit; realizedPnL+=t.floatingPnL; balance+=t.floatingPnL; totalTradesClosed++; if(win) totalWins++; signalLog=signalLog.map(entry=>(entry.symbol===sym&&entry.result==="OPEN")?{...entry,result:win?"WIN":"LOSS"}:entry); activeTrades.delete(sym); saveState(); triggerVoice(`${sym} ${win?"TP hit ✅":"SL hit ❌"}`,win?"info":"warning");} } if(lastPrices.has(sym) && now-lastPrices.get(sym).time>=60000){ let old=lastPrices.get(sym).price, move=((cp-old)/old)*100; if(Math.abs(move)>=1.2) triggerVoice(`${sym.replace("USDT","")} ${move>0?"pump 🔥":"dump 📉"} ${move.toFixed(1)}% in 1m`,"warning");} lastPrices.set(sym,{price:cp,time:now});} updateUI(); }catch(e){}}

        function processBTCUnflow() { let btc = fullDataMap.get("BTCUSDT"); if(btc) document.getElementById('btcTrendBadge2').innerHTML = `BTC FLOW: ${btc.change1h>=0?"🚀 BULLISH WAVE":"⚠️ BEARISH WAVE"}`; }
        window.loadChart2 = function(sym) { if(tvWidget1) try{tvWidget1.remove();}catch(e){} tvWidget1=new TradingView.widget({width:"100%",height:"100%",symbol:"BINANCE:"+sym,interval:"60",theme:"light",container_id:"tvChartContainer2_1",studies:["RSI@tv-basicstudies"]}); document.getElementById('chartSymbol2_1').innerText = `${sym} (C1)`; };
        window.loadChart2_2 = function(sym) { if(tvWidget2) try{tvWidget2.remove();}catch(e){} tvWidget2=new TradingView.widget({width:"100%",height:"100%",symbol:"BINANCE:"+sym,interval:"60",theme:"light",container_id:"tvChartContainer2_2",studies:["RSI@tv-basicstudies"]}); document.getElementById('chartSymbol2_2').innerText = `${sym} (C2)`; };
        function buildModule2UI() {
            let html = `<div class="signal-header" id="mainHeader2"><div class="brand"><h1>⚡ DEEP MIND QUANT AI ENGINE <span>PRO Box</span></h1><div class="live-node"><span class="live-dot"></span><span>1H Sync</span></div></div><div><button id="manualRefresh2" class="btn">⟳ FORCE AI RE-SCAN</button><span id="updateTimestamp2"></span></div></div>
            <div class="card auto-bot-card"><div class="card-header"><span>🛡️ ZORO LIVE TERMINAL (PERSISTENT)</span><button class="hide-btn" data-target="botCardBody">➖ Hide</button></div><div class="card-body" id="botCardBody"><div class="bot-metric-box" style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;"><div class="metric-tile"><div>Balance</div><div id="botBalance2">$10000</div></div><div class="metric-tile"><div>Floating PnL</div><div id="botFloatingPnL2">$0</div></div><div class="metric-tile"><div>Realized PnL</div><div id="botRealizedPnL2">$0</div></div><div class="metric-tile"><div>Win Rate</div><div id="botWinRate2">0%</div></div></div><table class="data-table"><thead><tr><th>ASSET</th><th>SIDE</th><th>MARGIN</th><th>ENTRY</th><th>CURRENT</th><th>SL</th><th>TP</th><th>PNL</th></tr></thead><tbody id="botActiveOrdersBody2"></tbody></table></div></div>
            <div class="card"><div class="card-header">🧠 AI ENGINE LOGIC MODULE</div><div class="card-body"><div id="btcTrendBadge2">BTC FLOW: --</div><div class="split-gainer-loser-box"><div class="split-panel"><div>🔥 Top 5 Gainers</div><div id="topGainers2"></div></div><div class="split-panel"><div>📉 Top 5 Losers</div><div id="topLosers2"></div></div></div></div></div>
            <div class="card"><div class="card-header">📊 COGNITIVE AI MATRIX (EMA • CVD% • OBI%)<div><input type="text" id="matrixSearch2" placeholder="Filter..."></div><button class="hide-btn" data-target="matrixBody">➖ Hide</button></div><div class="card-body" id="matrixBody"><div class="table-wrapper"><table class="data-table"><thead><tr><th>#</th><th>★</th><th>ASSET</th><th>PRICE</th><th>1H%</th><th>RSI</th><th>EMA(9)</th><th>CVD%</th><th>OBI%</th><th>SCORE</th><th>SMC PATTERN</th><th>SIGNAL</th></tr></thead><tbody id="signalTableBody2"></tbody></table></div></div></div>
            <div class="dual-chart-row"><div class="chart-card"><div class="chart-header"><span id="chartSymbol2_1">BTCUSDT (C1)</span><div><select id="chartSelect2_1"></select><button id="applyChart2_1" class="btn">APPLY</button><button class="hide-btn" data-target="chart1Body">➖ Hide</button></div></div><div class="chart-box-wrapper" id="chart1Body"><div id="tvChartContainer2_1" class="chart-box"></div></div></div><div class="chart-card"><div class="chart-header"><span id="chartSymbol2_2">ETHUSDT (C2)</span><div><select id="chartSelect2_2"></select><button id="applyChart2_2" class="btn">APPLY</button><button class="hide-btn" data-target="chart2Body">➖ Hide</button></div></div><div class="chart-box-wrapper" id="chart2Body"><div id="tvChartContainer2_2" class="chart-box"></div></div></div></div>
            <div class="card"><div class="card-header">⭐ MY WATCHLIST</div><div class="card-body"><div id="watchlistContainer2"></div></div></div>`;
            document.getElementById('app2Root').innerHTML = html;
            let opts = BASE.map(c=>`<option value="${c}USDT">${c}</option>`).join('');
            document.getElementById('chartSelect2_1').innerHTML = opts; document.getElementById('chartSelect2_2').innerHTML = opts;
            document.getElementById('chartSelect2_1').value = "BTCUSDT"; document.getElementById('chartSelect2_2').value = "ETHUSDT";
            document.getElementById('applyChart2_1').onclick = () => window.loadChart2(document.getElementById('chartSelect2_1').value);
            document.getElementById('applyChart2_2').onclick = () => window.loadChart2_2(document.getElementById('chartSelect2_2').value);
            document.getElementById('manualRefresh2').onclick = () => fetch1HData();
            document.getElementById('matrixSearch2').addEventListener('input', (e)=>{ matrixSearchQuery = e.target.value; renderTables(); });
            document.querySelectorAll('.hide-btn').forEach(btn => btn.addEventListener('click', function() { let target = document.getElementById(this.getAttribute('data-target')); if(target) { if(target.style.display === 'none') { target.style.display = 'block'; this.innerText = '➖ Hide'; } else { target.style.display = 'none'; this.innerText = '➕ Show'; } } }));
        }
        buildModule2UI(); fetch1HData(); window.loadChart2("BTCUSDT"); window.loadChart2_2("ETHUSDT"); setInterval(fetch1HData, 20000);
        let ws = new WebSocket("wss://stream.binance.com:9443/stream?streams=" + ALL_SYMBOLS2.map(s=>s.toLowerCase()+"@trade").join('/'));
        ws.onmessage = (e) => { let data = JSON.parse(e.data); let sym = data.stream.split('@')[0].toUpperCase(); let price = parseFloat(data.data.p); processPriceTick(sym, price); };
    })();
</script>
